name: Ping
options:
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: 1.36.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.19
settings:
  base:
    PRODUCT_NAME: Ping
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
targets:
  Ping iOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    configFiles:
      Debug: iOS/Config/TMBKeys.xcconfig
      Release: iOS/Config/TMBKeys.xcconfig
    sources:
      - path: Shared
      - path: iOS
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: SwiftProtobuf
      - package: ZIPFoundation
      - target: PingWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ping.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: WXKM9YZDXT
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: iOS/Info.plist
  Ping macOS:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Shared
      - path: macOS
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: SwiftProtobuf
      - package: ZIPFoundation
    info:
      path: macOS/Info.plist
      properties:
        LSUIElement: true
        NSCalendarsUsageDescription: Ping uses your calendar to suggest when to leave for upcoming commutes.
        NSLocationWhenInUseUsageDescription: Ping uses your location to estimate how long it takes to walk to your origin station.
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - ca
          - es
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ping.macos
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  PingWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Shared
      - path: Widgets
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: SwiftProtobuf
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.ping.ios.widgets
        PRODUCT_NAME: PingWidgets
        PRODUCT_MODULE_NAME: PingWidgets
        DEVELOPMENT_TEAM: WXKM9YZDXT
        INFOPLIST_FILE: Widgets/Info.plist
schemes:
  Ping iOS:
    build:
      targets:
        Ping iOS: all
    run:
      config: Debug
  Ping macOS:
    build:
      targets:
        Ping macOS: all
    run:
      config: Debug
